<!DOCTYPE html>

<html class="light" lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>李记茶 - AR 识茶</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@700&amp;family=Manrope:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "tertiary-fixed": "#ffdea7",
                        "secondary-fixed-dim": "#dfc29f",
                        "on-tertiary-container": "#fff0dd",
                        "tertiary-fixed-dim": "#e6c181",
                        "on-primary-fixed": "#092007",
                        "on-background": "#1d1c17",
                        "primary": "#435c3c",
                        "primary-fixed-dim": "#b2cfa7",
                        "surface-dim": "#ded9d2",
                        "on-primary-fixed-variant": "#354d2e",
                        "on-primary-container": "#ddfad0",
                        "secondary-fixed": "#fcdeba",
                        "on-secondary-container": "#755f42",
                        "surface": "#fef9f1",
                        "surface-variant": "#e7e2da",
                        "on-secondary-fixed-variant": "#574329",
                        "on-tertiary-fixed-variant": "#5b430e",
                        "inverse-on-surface": "#f5f0e8",
                        "surface-bright": "#fef9f1",
                        "inverse-primary": "#b2cfa7",
                        "on-secondary-fixed": "#281903",
                        "primary-container": "#5b7553",
                        "surface-container": "#f2ede5",
                        "secondary-container": "#f9dbb7",
                        "secondary": "#715b3e",
                        "on-secondary": "#ffffff",
                        "error": "#ba1a1a",
                        "primary-fixed": "#cdebc1",
                        "on-tertiary-fixed": "#271900",
                        "surface-container-low": "#f8f3eb",
                        "surface-tint": "#4c6544",
                        "surface-container-highest": "#e7e2da",
                        "on-error": "#ffffff",
                        "error-container": "#ffdad6",
                        "background": "#fef9f1",
                        "on-primary": "#ffffff",
                        "outline": "#74796f",
                        "inverse-surface": "#32302b",
                        "tertiary": "#6c521d",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary": "#ffffff",
                        "on-surface-variant": "#434840",
                        "on-error-container": "#93000a",
                        "tertiary-container": "#876a33",
                        "on-surface": "#1d1c17",
                        "outline-variant": "#c3c8bd",
                        "surface-container-high": "#ece8e0"
                    },
                    fontFamily: {
                        "headline": ["Noto Serif SC"],
                        "body": ["Manrope"],
                        "label": ["Manrope"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .scanner-line {
            animation: scan 3s ease-in-out infinite;
        }
        @keyframes scan {
            0%, 100% { top: 0%; opacity: 0.2; }
            50% { top: 100%; opacity: 0.8; }
        }
        .corner-glow {
            box-shadow: 0 0 15px #ffdea7;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-on-surface font-body overflow-hidden h-screen w-full">
<!-- Full-screen Camera Viewfinder -->
<div class="absolute inset-0 z-0">
<img class="w-full h-full object-cover" data-alt="Top-down view of high-quality loose dry tea leaves" src="https://lh3.googleusercontent.com/aida-public/AB6AXuChr-i29ct_U_2GYJmYOUyIyUcpnp50YtE7Q7pAYLM-J1jK3SjAJXWIUCIRl5SA6qQWWyzlFTiUygIOIlQjqzWaTSnus30Ssyf6ZUQPLNDmbV7ptDM6ZkrrzfxYTWYvQWYOFPa8oGcZYKsZKiPHU3Oc-9iNQqq3DOY1Ck7m-kFNZteCp1fgu717H4LmQ4bc3ZcYT_WshWFxosKoMaoBVnn6KK-InOMjtbchJNMn7XQ8y_JNV8UwoNaxIvr6ixEtMPUHY2omiilbzfM"/>
<!-- Dark Overlay for Camera UI readability -->
<div class="absolute inset-0 bg-black/20"></div>
</div>
<!-- Top App Bar (Shared Component Logic) -->
<header class="fixed top-0 w-full z-50 bg-transparent backdrop-blur-md dark:bg-transparent flex justify-between items-center px-6 py-4 w-full">
<div class="flex items-center">
<button class="text-surface hover:opacity-80 transition-opacity active:scale-95 duration-200">
<span class="material-symbols-outlined text-2xl" data-icon="arrow_back">arrow_back</span>
</button>
</div>
<h1 class="font-headline font-bold text-lg text-surface tracking-wide">AR 识茶</h1>
<div class="flex items-center gap-4">
<button class="text-surface hover:opacity-80 transition-opacity active:scale-95 duration-200">
<span class="material-symbols-outlined text-2xl" data-icon="flash_on">flash_on</span>
</button>
</div>
</header>
<!-- Scanning Interface -->
<div class="absolute inset-0 flex flex-col items-center justify-center z-10 pointer-events-none">
<!-- Scanning Frame -->
<div class="relative w-[240px] h-[240px] mb-8">
<!-- Frame Corners (Gold #C4A265 derived from tertiary) -->
<div class="absolute top-0 left-0 w-8 h-8 border-t-4 border-l-4 border-tertiary-fixed rounded-tl-xl corner-glow"></div>
<div class="absolute top-0 right-0 w-8 h-8 border-t-4 border-r-4 border-tertiary-fixed rounded-tr-xl corner-glow"></div>
<div class="absolute bottom-0 left-0 w-8 h-8 border-b-4 border-l-4 border-tertiary-fixed rounded-bl-xl corner-glow"></div>
<div class="absolute bottom-0 right-0 w-8 h-8 border-b-4 border-r-4 border-tertiary-fixed rounded-br-xl corner-glow"></div>
<!-- Scanning Line -->
<div class="scanner-line absolute left-0 right-0 h-0.5 bg-gradient-to-r from-transparent via-tertiary-fixed to-transparent shadow-[0_0_10px_#ffdea7]"></div>
<!-- Subtle Frame Overlay -->
<div class="absolute inset-0 border border-white/10 rounded-xl"></div>
</div>
<!-- Instructions & State -->
<div class="flex flex-col items-center space-y-4">
<p class="text-surface text-sm font-medium tracking-widest opacity-90">将茶叶对准框内</p>
<!-- Identifying State -->
<div class="flex items-center gap-3 bg-black/40 backdrop-blur-md px-4 py-2 rounded-full border border-white/10">
<div class="w-4 h-4 border-2 border-tertiary-fixed border-t-transparent rounded-full animate-spin"></div>
<span class="text-tertiary-fixed text-xs font-bold tracking-widest">识别中...</span>
</div>
</div>
</div>
<!-- Bottom Toolbar (Custom Camera Shell) -->
<div class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-8 pb-12 pt-6">
<!-- Photo Library -->
<button class="flex flex-col items-center justify-center text-surface p-4 hover:opacity-80 transition-opacity active:scale-90 duration-300">
<span class="material-symbols-outlined text-2xl" data-icon="photo_library">photo_library</span>
</button>
<!-- Capture Button -->
<div class="relative group cursor-pointer active:scale-95 transition-transform duration-200">
<div class="w-20 h-20 rounded-full border-4 border-tertiary-fixed flex items-center justify-center p-1">
<div class="w-full h-full bg-surface rounded-full shadow-inner flex items-center justify-center">
<div class="w-14 h-14 rounded-full border-2 border-primary-container/20"></div>
</div>
</div>
</div>
<!-- History -->
<button class="flex flex-col items-center justify-center text-surface p-4 hover:opacity-80 transition-opacity active:scale-90 duration-300">
<span class="material-symbols-outlined text-2xl" data-icon="history">history</span>
</button>
</div>
<!-- Result Bottom Sheet (Initial State) -->
<div class="fixed bottom-0 left-0 w-full z-50 px-4">
<!-- Result Peek -->
<div class="bg-surface/90 backdrop-blur-2xl rounded-t-[32px] pt-2 pb-10 shadow-[0_-10px_40px_rgba(0,0,0,0.3)] flex flex-col items-center translate-y-2">
<!-- Handle -->
<div class="w-12 h-1 bg-on-surface/10 rounded-full mb-6 mt-1"></div>
<!-- Preview Content -->
<div class="w-full px-8 flex justify-between items-center mb-10">
<div class="flex flex-col gap-1">
<span class="text-primary text-xs font-bold tracking-widest uppercase opacity-60">识别结果预览</span>
<h3 class="font-headline text-xl text-on-surface">特级西湖龙井</h3>
</div>
<!-- Confidence Badge -->
<div class="bg-primary text-on-primary text-[10px] font-bold py-1.5 px-4 rounded-full flex items-center gap-1.5">
<span class="w-1.5 h-1.5 bg-green-400 rounded-full"></span>
                    匹配度 96%
                </div>
</div>
</div>
</div>
<!-- Visual Polish: Vignette -->
<div class="fixed inset-0 pointer-events-none bg-gradient-to-b from-black/40 via-transparent to-black/60 z-0"></div>
</body></html>

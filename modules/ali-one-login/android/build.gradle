// build.gradle - 阿里云一键登录 Android 原生模块配置
// 遵循 KISS/YAGNI/SOLID 原则：最小依赖，只包含必要配置

plugins {
    id 'com.android.library'
    id 'org.jetbrains.kotlin.android'
}

android {
    // 命名空间必须与包名一致
    namespace 'com.lijitea.alioneclick'
    compileSdk 34

    defaultConfig {
        minSdk 24
        targetSdk 34
        // 构建配置字段：存储阿里云 AppKey（运行时由 MainApplication 传入）
        def aliAppKey = project.findProperty('ALI_APP_KEY') ?: ''
        buildConfigField 'String', 'ALI_APP_KEY', "\"${aliAppKey}\""
        // AndroidManifest.xml 中 ${ALI_APP_KEY} 占位符替换
        manifestPlaceholders = [ALI_APP_KEY: aliAppKey]
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget '17'
    }

    buildFeatures {
        buildConfig true
    }
}

dependencies {
    // React Native 核心库（必须）
    implementation 'com.facebook.react:react-android'

    // 阿里云融合认证 SDK（本地 AAR）
    implementation fileTree(dir: 'libs', include: ['*.aar'])

    // Kotlin 协程（用于异步操作）
    implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3'
}
